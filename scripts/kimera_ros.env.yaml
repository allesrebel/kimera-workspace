name: kimera_ros
# RoboStack channel ordering: robostack-staging first, then conda-forge.
# Hard exclude `defaults` — mixing it in collides with robostack's
# ros-distro-mutex.
channels:
  - robostack-staging
  - conda-forge
  - nodefaults
dependencies:
  # Core ROS Noetic. ros-noetic-desktop transitively pulls cv_bridge, tf,
  # rviz, image_transport, sensor_msgs, etc. — do NOT also list those
  # explicitly; over-constraining provokes ros-distro-mutex conflicts.
  - ros-noetic-desktop
  # Catkin build tooling.
  - catkin_tools
  - vcstool
  # C/C++ toolchain. `compilers` is the conda-forge meta-package for the
  # full GCC/G++/binutils set.
  - compilers
  - cmake
  - make
  - ninja
  - pkg-config
  # System-level deps the catkin packages need at build time. We install
  # gtsam and eigen from conda, so we pin them here.
  # Note: pin eigen=3.4.0 to prevent newer eigen updates from breaking the
  # gtsam build.
  - gflags
  - glog
  - boost-cpp
  - tbb-devel
  - libprotobuf
  - gtsam
  - eigen=3.4.0
  # ROS package dependencies missing from the RoboStack desktop meta-package
  # but required by kalibr.
  - ros-noetic-image-geometry
  - ros-noetic-image-proc
  # Python (let solver pick a version compatible with ros-noetic-desktop).
  - numpy
  - scipy
  - matplotlib
